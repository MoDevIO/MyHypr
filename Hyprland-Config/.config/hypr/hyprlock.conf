# BACKGROUND
background {
    monitor =
    path = screenshot
    blur_passes = 3
    contrast = 0.82
    brightness = 0.72
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# TIME
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(date +"%-I:%M%p")"
    color = rgba(255, 255, 255, 0.95)
    font_size = 120
    font_family = SF Pro Display Bold
    position = 0, -140
    halign = center
    valign = top
}

# DAY-DATE-MONTH
label {
    monitor = DP-1
    text = cmd[update:1000] echo "<span>$(date '+%A, %d %B')</span>"
    color = rgba(200, 200, 200, 0.72)
    font_size = 30
    font_family = SF Pro Display Bold
    position = 0, 200
    halign = center
    valign = center
}

# LOGO
label {
    monitor = DP-1
    text = <span>    </span>
    color = rgba(220, 220, 220, 0.60)
    font_size = 120
    font_family = SF Pro Display Bold, JetBrains Mono Nerd
    position = 0, 60
    halign = center
    valign = center
}

# USER
label {
    monitor = DP-1
    text = Hello, $USER
    color = rgba(180, 180, 180, 0.65)
    font_size = 25
    font_family = SF Pro Display Bold
    position = 0, -70
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor = DP-1
    size = 340, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(40, 40, 40, 0.40)
    font_color = rgb(240, 240, 240)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##cccccc99">  Password  </span></i>
    hide_input = false
    position = 0, -140
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(~/.config/hypr/hyprlock/Scripts/songdetail.sh)" 
    color = rgba(160, 160, 160, 0.70)
    font_size = 16
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 80
    halign = center
    valign = bottom
}
