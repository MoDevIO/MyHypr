###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# --- Logitech G-keys --- #
$keyboard-G1 = code:191 # G1 key on Logitech G-keys
$keyboard-G2 = code:192 # G2 key on Logitech G-keys
$keyboard-G3 = code:193 # G3 key on Logitech G-keys
$keyboard-G4 = code:194 # G4 key on Logitech G-keys
$keyboard-G5 = code:195 # G5 key on Logitech G-keys

$mouse-G1 = code:196 # Top mouse button
#$mouse-G2 = code:197 # DPI-Shift button
$mouse-G3 = code:200 # Front side mouse button
$mouse-G4 = code:199 # Back side mouse button
# ----------------------- #



## --- Programs --- ##
bind = $mainMod, R, exec, $menu
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, S, exec, hyprctl clients -j | jq -e '.[] | select(.class == "Spotify")' > /dev/null || spicetify watch -s
bind = $mainMod, S, togglespecialworkspace, spotify
bind = $mainMod, G, exec, $codeEditor
bind = $mainMod, T, exec, pgrep -x beepertexts > /dev/null && hyprctl dispatch togglespecialworkspace beeper || (hyprctl dispatch exec [workspace special:beeper silent] beeper && sleep 0.5 && hyprctl dispatch togglespecialworkspace beeper)
bind = $mainMod, L, exec, hyprlock

bind = , code:66, exec, ~/.config/hypr/hyprland/scripts/capslock.sh

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copied to clipboard" -a "Hyprland" -i camera-photo
bind = $mainMod, N, exec, $notificationPanel
bind = $mainMod SHIFT, T, exec, ~/.config/theming/theme-switcher.sh
bind = $mainMod SHIFT, M, exec, bluetoothctl list | grep "Controller" | awk '{print $2}' | bluetoothctl disconnect
bind = $mainMod SHIFT, Escape, exec, ~/.config/hypr/hyprland/scripts/shutdown-transition.sh
bind = $mainMod, O, exec, hyprctl dispatch dpms toggle

bind = $mainMod SHIFT, R, exec, $reloadMybar

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen,
bind = $mainMod SHIFT, C, centerwindow

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window position with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# --- MONITOR 1 --- #
# Switch workspaces with mainMod + [1-5]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
# Move active window to a workspace with mainMod + SHIFT + [1-5]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# --- MONITOR 2 --- #
# Switch workspaces with mainMod + CTRL + [1-5]
bind = $mainMod CTRL, 1, workspace, 6
bind = $mainMod CTRL, 2, workspace, 7
bind = $mainMod CTRL, 3, workspace, 8
bind = $mainMod CTRL, 4, workspace, 9
bind = $mainMod CTRL, 5, workspace, 10
# Move active window to a workspace with mainMod + SHIFT + CTRL + [1-5]
bind = $mainMod SHIFT CTRL, 1, movetoworkspace, 6
bind = $mainMod SHIFT CTRL, 2, movetoworkspace, 7
bind = $mainMod SHIFT CTRL, 3, movetoworkspace, 8
bind = $mainMod SHIFT CTRL, 4, movetoworkspace, 9
bind = $mainMod SHIFT CTRL, 5, movetoworkspace, 10

# Cycle workspaces on the currently focused monitor with mainMod + ALT + arrow keys
bind = $mainMod ALT, right, exec, ~/.config/hypr/hyprland/scripts/workspace-cycle.sh next
bind = $mainMod ALT, left, exec, ~/.config/hypr/hyprland/scripts/workspace-cycle.sh prev

# Focus next/previous monitor without wrapping with mainMod + ALT + up/down
bind = $mainMod ALT, down, exec, ~/.config/hypr/hyprland/scripts/monitor-cycle.sh prev
bind = $mainMod ALT, up, exec, ~/.config/hypr/hyprland/scripts/monitor-cycle.sh next

# Scroll through workspaces with mainMod + scroll
bind = $mainMod, mouse_up, exec, ~/.config/hypr/hyprland/scripts/workspace-cycle.sh next
bind = $mainMod, mouse_down, exec, ~/.config/hypr/hyprland/scripts/workspace-cycle.sh prev

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 3%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# G-Keys - App-specific macros via g-keys.sh

bind = , $keyboard-G1, exec, ~/.config/hypr/hyprland/scripts/g-keys.sh G1

bind = , $keyboard-G2, exec, ~/.config/hypr/hyprland/scripts/g-keys.sh G2

bind = , $keyboard-G3, exec, ~/.config/hypr/hyprland/scripts/g-keys.sh G3

bind = , $keyboard-G4, exec, ~/.config/hypr/hyprland/scripts/g-keys.sh G4

bind = , $keyboard-G5, exec, ~/.config/hypr/hyprland/scripts/g-keys.sh G5

bind = , $mouse-G1, exec, ~/.config/hypr/hyprland/scripts/g-keys.sh mouse-G1

bind = , $mouse-G2, exec, ~/.config/hypr/hyprland/scripts/g-keys.sh mouse-G2

bind = , $mouse-G3, exec, ~/.config/hypr/hyprland/scripts/g-keys.sh mouse-G3

bind = , $mouse-G4, exec, ~/.config/hypr/hyprland/scripts/g-keys.sh mouse-G4
